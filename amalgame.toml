
[package]
name = "amalgame-net-smtp"
version = "0.1.2"
license = "Apache-2.0"
description = "Minimal SMTP client — send transactional mail over implicit TLS (port 465). Header-only binding on OpenSSL."
required-amalgame = ">=0.8.58"
schema-version = 1

[stdlib]
class = "Smtp"
header = "runtime/Amalgame_Net_Smtp.h"
namespace = "Amalgame.Net.Smtp"
libs = ["ssl", "crypto"]

[stdlib.functions]

[stdlib.functions.Smtp_Send]
returns = "code_bool"

[stdlib.functions.Smtp_LastError]
returns = "code_string"

[dependencies]

[dependencies.smtp]
git = "github.com/amalgame-lang/amalgame-net-smtp"
tag = "v0.1.0"
