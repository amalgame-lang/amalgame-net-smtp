name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Smoke (OpenSSL header + ABI)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        amc-tag: [v0.8.70]
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends libgc-dev libssl-dev

      - name: Download amc
        run: |
          TAG="${{ matrix.amc-tag }}"
          VERSION="${TAG#v}"
          curl -sSL -o amc.tar.gz \
            "https://github.com/amalgame-lang/Amalgame/releases/download/${TAG}/amc-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p "$RUNNER_TEMP/amc-install"
          tar -xzf amc.tar.gz -C "$RUNNER_TEMP/amc-install" --strip-components=1
          echo "AMC=$RUNNER_TEMP/amc-install/bin/amc" >> "$GITHUB_ENV"
          echo "AMC_RUNTIME=$RUNNER_TEMP/amc-install/share/amalgame/runtime" >> "$GITHUB_ENV"

      - name: Run tests
        run: ./tests/run_tests.sh
